<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8"/>
      <stop offset="100%" style="stop-color:#e8dcc8"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#keyGrad)"/>

  <!-- Subtle grid texture -->
  <rect width="1024" height="1024" rx="224" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Key body -->
  <rect x="192" y="248" width="640" height="440" rx="72"
        fill="none"
        stroke="#ffffff"
        stroke-width="36"
        stroke-opacity="0.12"
        filter="url(#softShadow)"/>

  <!-- Key top face (slightly offset for 3D feel) -->
  <rect x="192" y="224" width="640" height="420" rx="72"
        fill="#2a2a3e"
        stroke="#ffffff"
        stroke-width="2"
        stroke-opacity="0.08"/>

  <!-- Inner key surface -->
  <rect x="220" y="252" width="584" height="364" rx="52"
        fill="#1e1e30"
        stroke="#ffffff"
        stroke-width="1"
        stroke-opacity="0.06"/>

  <!-- Lightning bolt — the single hero element -->
  <!-- Top segment of bolt -->
  <polygon
    points="548,288  440,520  508,520  476,736  584,472  512,472"
    fill="url(#boltGrad)"
    stroke="none"
    opacity="0.95"/>

</svg>
